[build]
  command = "npm install"

[[edge_functions]]
  # The Edge function now handles BOTH authentication AND the secret proxying.
  path = "/tos/*"
  function = "protect-tos"

[[redirects]]
  # Redirect any other traffic (like /js/ or /css/ that isn't under /tos/)
  # We use the Edge Function for the main entry, but for assets it's safer
  # to keep a general fallback or just let the Edge Function handle all /*
  # if the NAS serves assets from the root.
  from = "/js/*"
  to = "http://172.222.155.52:8181/js/:splat"
  status = 200

[[redirects]]
  from = "/css/*"
  to = "http://172.222.155.52:8181/css/:splat"
  status = 200

[[redirects]]
  from = "/img/*"
  to = "http://172.222.155.52:8181/img/:splat"
  status = 200
