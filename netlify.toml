[build]
  command = "npm install"

[[edge_functions]]
  # This is the Master Firewall. It checks every request to 'caliteservicios.com'
  # 1. Blocks bots instantly (saves bandwidth)
  # 2. Checks against the Dashboard Blacklist
  # 3. Authenticates and Proxies the Nas Gateway
  path = "/*"
  function = "firewall"

[[redirects]]
  # We still need these fallbacks for when the NAS refers to root-level assets
  # directly like /js/layer/layer.js
  from = "/js/*"
  to = "http://172.222.155.52:8181/js/:splat"
  status = 200

[[redirects]]
  from = "/css/*"
  to = "http://172.222.155.52:8181/css/:splat"
  status = 200

[[redirects]]
  from = "/img/*"
  to = "http://172.222.155.52:8181/img/:splat"
  status = 200
