[build]
  command = "npm install"

[[edge_functions]]
  path = "/tos/*"
  function = "firewall"

[[redirects]]
  # This rule ONLY fires if the Edge Function calls context.next() (meaning auth is OK)
  from = "/tos/*"
  to = "http://172.222.155.52:8181/tos/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/js/*"
  to = "http://172.222.155.52:8181/js/:splat"
  status = 200

[[redirects]]
  from = "/css/*"
  to = "http://172.222.155.52:8181/css/:splat"
  status = 200

[[redirects]]
  from = "/img/*"
  to = "http://172.222.155.52:8181/img/:splat"
  status = 200
